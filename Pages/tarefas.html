<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snotes</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 40px auto; padding: 20px; }
        .entrada-tarefa { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 8px; }
        ul { list-style: none; padding: 0; }
        li { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <h1>Minhas Tarefas</h1>
    
    <div class="entrada-tarefa">
        <input type="text" id="nova-tarefa" placeholder="Nova tarefa...">
        <button onclick="adicionarTarefa()">+</button>
    </div>

    <ul id="lista-tarefas"></ul>

    <footer>
        <p>Desenvolvido por Silvia Monteiro</p>
    </footer>

    <script>
        window.onload = async () => {
            const res = await fetch('http://localhost:3000/tarefas');
            const tarefas = await res.json();
            tarefas.forEach(texto => renderizar(texto));
        };

        function renderizar(texto) {
            const li = document.createElement('li');
            li.innerHTML = `${texto} <button onclick="remover(this)">X</button>`;
            document.getElementById('lista-tarefas').appendChild(li);
        }

        function remover(btn) {
            btn.parentElement.remove();
            salvar();
        }

        async function salvar() {
            const tarefas = [...document.querySelectorAll('#lista-tarefas li')]
                .map(li => li.firstChild.textContent.trim());
            await fetch('http://localhost:3000/tarefas', {
                method: 'POST',
                body: JSON.stringify(tarefas)
            });
        }

        function adicionarTarefa() {
            const texto = document.getElementById('nova-tarefa').value;
            if (!texto.trim()) return;
            renderizar(texto);
            salvar();
            document.getElementById('nova-tarefa').value = '';
        }
    </script>

</body>
</html>
