<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snotes</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 40px auto; padding: 20px; }
        .entrada-tarefa { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 8px; }
        ul { list-style: none; padding: 0; }
        li { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <h1>Minhas Tarefas</h1>
    
    <div class="entrada-tarefa">
        <input type="text" id="nova-tarefa" placeholder="Nova tarefa...">
        <button onclick="adicionarTarefa()">+</button>
    </div>

    <ul id="lista-tarefas">
        <li>Exemplo de tarefa <button>X</button></li>
    </ul>
    <footer>
        <p>
            Desenvolvido por Silvia Monteiro
        </p>
    </footer>
    <script>
        function adicionarTarefa() {
            alert('Botão clicado!');
        }
    </script>

</body>
</html>
